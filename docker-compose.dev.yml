version: '3.8'

services:
  frontend:
    image: node:18
    container_name: gym-app-frontend
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html:delegated
      - /var/www/html/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8080"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - HOST=0.0.0.0
      - PORT=8080
    ports:
      - "8080:8080"
    networks:
      - app-network

networks:
  app-network:
    external: true
