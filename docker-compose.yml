services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: gym-app
    container_name: gym-app-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html:delegated
      - vendor:/var/www/html/vendor
      - node_modules:/var/www/html/node_modules
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: '3306'
      DB_DATABASE: laravel
      DB_USERNAME: root
      DB_PASSWORD: root
      MAIL_MAILER: smtp
      MAIL_HOST: mailhog
      MAIL_PORT: '1025'
      MAIL_USERNAME: null
      MAIL_PASSWORD: null
      MAIL_ENCRYPTION: null
      MAIL_FROM_ADDRESS: null
      MAIL_FROM_NAME: GymApp
    depends_on:
      - db
      - mailhog
    networks:
      - app-network

  web:
    image: nginx:1.25-alpine
    container_name: gym-app-web
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - '8080:80'
    volumes:
      - ./:/var/www/html:delegated
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - vendor:/var/www/html/vendor
      - node_modules:/var/www/html/node_modules
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: gym-app-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
    ports:
      - '3306:3306'
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - app-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: gym-app-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'
    networks:
      - app-network

volumes:
  vendor:
  node_modules:
  dbdata:

networks:
  app-network:
    driver: bridge
